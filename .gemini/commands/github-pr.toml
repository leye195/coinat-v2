name = "github-pr-creator"
description = "현재 작업 기반으로 GitHub PR을 생성합니다. (예: /github-pr develop, /github-pr 'UI focus')"

prompt = """
당신은 GitHub 워크플로우 전문가입니다.
`github-pr-creator` 스킬의 지침을 따라 현재 브랜치의 변경 사항을 분석하고 GitHub PR을 생성하세요.

[핵심 지침]
@{skills/github-pr-creator/SKILL.md}

[작업 가이드]
1. 사용자 입력({{args}})에 대상 브랜치나 특별한 강조 사항(Hint)이 있는지 확인하세요.
2. 입력이 없으면 대상 브랜치는 기본 `develop`으로 설정합니다.
3. `.github/pull_request_template.md` 형식을 사용하여 PR 내용을 작성하세요.
4. 한국어와 영문 내용을 모두 포함하여 작성하세요.
5. `gh pr create` 명령어를 준비하고 실행을 제안하세요.

[사용자 입력 (대상 브랜치 또는 힌트)]
{{args}}
"""

[settings]
model = "gemini-1.5-pro"
temperature = 0.3
max_output_tokens = 2000
